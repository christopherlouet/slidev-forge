<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <clipPath id="bubble">
      <rect x="95" y="2" width="100" height="56" rx="10"/>
    </clipPath>
  </defs>
  <!-- BDX text in dark gray -->
  <text x="5" y="50" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="56" fill="#404040" letter-spacing="-2">BDX</text>
  <!-- Red speech bubble background -->
  <rect x="97" y="2" width="98" height="56" rx="10" fill="#E5322D"/>
  <!-- Left notch (speech bubble point) -->
  <polygon points="97,20 88,30 97,40" fill="#E5322D"/>
  <!-- Right notch -->
  <polygon points="195,20 204,30 195,40" fill="#E5322D"/>
  <!-- I/O text in white -->
  <text x="146" y="47" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="42" fill="white" letter-spacing="1">I/O</text>
  <!-- Subtitle -->
  <text x="5" y="74" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#404040" letter-spacing="0.5">Bordeaux Developer eXperience</text>
</svg>
